<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#050808" />
  <title>The Receiver — Episodes</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <main class="page">
    <section class="phone-shell episode-shell" aria-label="The Receiver episodes screen">
      <img
        class="background-image"
        src="./assets/the_receiver_index_background.png"
        alt=""
        aria-hidden="true"
      />

      <div class="background-atmosphere" aria-hidden="true"></div>
      <div class="background-vignette episode-vignette" aria-hidden="true"></div>
      <div class="scanlines" aria-hidden="true"></div>
      <div class="top-fade episode-top-fade" aria-hidden="true"></div>

      <div class="episode-content">
        <header class="episode-header">
          <a class="back-link" href="./index.html" aria-label="Back to The Receiver">
            <span aria-hidden="true"></span>
          </a>

          <div class="episode-brand">
            <span class="episode-brand-mark" aria-hidden="true">
              <svg viewBox="0 0 48 48" role="img">
                <circle cx="24" cy="24" r="22" fill="none" stroke="currentColor" stroke-width="1.4" />
                <path d="M6 24h10l3-8 5 18 5-26 5 16h8" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" />
              </svg>
            </span>
            <span>The Receiver</span>
          </div>
        </header>

        <section class="episode-title-block">
          <p class="episode-kicker">Season 1</p>
          <h1>Signals</h1>
          <p class="episode-subtitle">The First Sequence</p>

          <div class="episode-wave-divider" aria-hidden="true">
            <span></span>
            <svg viewBox="0 0 120 24" focusable="false">
              <path d="M0 12H38L42 8L46 16L50 6L55 19L60 5L65 18L70 9L74 12H120" />
            </svg>
            <span></span>
          </div>
        </section>

        <section class="episodes-list">
          <a class="episode-card" href="./episode-1.html">
            <span class="episode-card-number">01</span>
            <span>
              <strong>Signal 01</strong>
              <em>The Night It Appeared</em>
            </span>
          </a>

          <a class="episode-card" href="./episode-2.html">
            <span class="episode-card-number">02</span>
            <span>
              <strong>Signal 02</strong>
              <em>The Second Formation</em>
            </span>
          </a>

          <div class="episode-card episode-card-locked">
            <span class="episode-card-number">03</span>
            <span>
              <strong>Signal 03</strong>
              <em>Locked</em>
            </span>
          </div>
        </section>
      </div>
    </section>
  </main>

  <script src="./script.js"></script>
</body>
</html>
