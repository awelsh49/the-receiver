<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#050808" />
  <title>The Receiver</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <main class="page">
    <section class="phone-shell" aria-label="The Receiver home screen">
      <img
        class="background-image"
        src="./assets/the_receiver_index_background.png"
        alt=""
        aria-hidden="true"
      />

      <div class="background-atmosphere" aria-hidden="true"></div>
      <div class="background-vignette" aria-hidden="true"></div>
      <div class="scanlines" aria-hidden="true"></div>
      <div class="top-fade" aria-hidden="true"></div>

      <div class="content">
        <section class="hero" aria-labelledby="home-title">
          <h1 id="home-title">The<br />Receiver</h1>

          <div class="wave-divider" aria-hidden="true">
            <span class="divider-line"></span>
            <svg viewBox="0 0 120 24" focusable="false">
              <path d="M0 12H38L42 8L46 16L50 6L55 19L60 5L65 18L70 9L74 12H120" />
            </svg>
            <span class="divider-line"></span>
          </div>

          <p class="story-copy">
            On a cold, dark, otherwise ordinary evening, Brody Johnson was taking a picture of the rain when something appeared in the frame that wasn’t in the scene.
          </p>

          <p class="story-copy story-copy-last">
            Brody’s world is about to become anything but ordinary.
          </p>
        </section>

        <section class="actions" aria-label="Season actions">
          <button class="primary-action" type="button" data-action="begin-season">
            <span class="action-icon receiver-icon" aria-hidden="true">
              <span class="corner top-left"></span>
              <span class="corner top-right"></span>
              <span class="corner bottom-left"></span>
              <span class="corner bottom-right"></span>
              <span class="target-ring"></span>
            </span>

            <span class="action-text">
              <span class="action-title">Begin Season 1</span>
              <span class="action-subtitle">Play Signal 01</span>
            </span>

            <span class="chevron" aria-hidden="true"></span>
          </button>

          <button class="secondary-action" type="button" data-action="view-episodes">
            <span class="action-icon list-icon" aria-hidden="true">
              <span></span>
              <span></span>
              <span></span>
            </span>

            <span class="action-text">
              <span class="action-title">View Episodes</span>
              <span class="action-subtitle">See all signals</span>
            </span>

            <span class="chevron" aria-hidden="true"></span>
          </button>
        </section>
      </div>
    </section>
  </main>

  <script src="./script.js"></script>
</body>
</html>
